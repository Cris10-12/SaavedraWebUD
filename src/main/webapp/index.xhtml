<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="jakarta.faces.passthrough">

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Aspirante – U. Distrital</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>


    <h:outputStylesheet library="css" name="estilos.css"/>
</h:head>

<h:body>

<header class="ud-header">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
            <h1><i class="bi bi-mortarboard-fill me-2"></i>Sistema de Registro de Aspirantes</h1>
            <p>Universidad Distrital Francisco José De Caldas</p>
        </div>

        <div class="text-end">
            <span class="ud-badge">2026</span><br/>


            <h:link outcome="listado" styleClass="link-admin mt-1 d-inline-block">
                <i class="bi bi-table me-1"></i>Ver listado
            </h:link>

            <h:link outcome="cdt" styleClass="link-admin mt-1 d-inline-block ms-2">
                <i class="bi bi-cash-coin me-1"></i>Simulador CDT
            </h:link>
        </div>
    </div>
</header>

<div class="container mt-3">
    <h:messages globalOnly="true" layout="table" styleClass="alert alert-danger" />
</div>

<main class="container my-4 flex-grow-1">

    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <div class="card card-form">
                <div class="card-header">
                    <i class="bi bi-person-plus-fill me-2"></i>Formulario de Registro
                </div>

                <div class="card-body p-4">

                    <p class="text-muted mb-4">
                        Complete todos los campos marcados con
                        <span class="required-star">*</span>
                    </p>

                    <h:form id="frmRegistro">

                        <div class="mb-3">
                            <label class="form-label">
                                Número de Identificación <span class="required-star">*</span>
                            </label>
                            <h:inputText value="#{aspiranteBean.aspirante.identificacion}"
                                         styleClass="form-control" required="true">
                                <f:validateRegex pattern="[0-9]{1,20}" />
                            </h:inputText>
                            <h:message for="identificacion" styleClass="ud-error" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Nombres <span class="required-star">*</span>
                            </label>
                            <h:inputText value="#{aspiranteBean.aspirante.nombres}"
                                         styleClass="form-control" required="true">
                                <f:validateRegex pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]{2,60}" />
                            </h:inputText>
                            <h:message for="nombres" styleClass="ud-error" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Apellidos <span class="required-star">*</span>
                            </label>
                            <h:inputText value="#{aspiranteBean.aspirante.apellidos}"
                                         styleClass="form-control" required="true">
                                <f:validateRegex pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]{2,60}" />
                            </h:inputText>
                            <h:message for="apellidos" styleClass="ud-error" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Correo Electrónico <span class="required-star">*</span>
                            </label>
                            <h:inputText value="#{aspiranteBean.aspirante.correo}"
                                         styleClass="form-control" required="true">
                                <f:validateRegex pattern="^[\w\.\-]+@[\w\.\-]+\.[a-zA-Z]{2,}$" />
                            </h:inputText>
                            <h:message for="correo" styleClass="ud-error" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Teléfono <span class="required-star">*</span>
                            </label>
                            <h:inputText value="#{aspiranteBean.aspirante.telefono}"
                                         styleClass="form-control" required="true">
                                <f:validateRegex pattern="[0-9]{7,15}" />
                            </h:inputText>
                            <h:message for="telefono" styleClass="ud-error" />
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Programa Academico <span class="required-star">*</span>
                            </label>
                            <h:selectOneMenu value="#{aspiranteBean.aspirante.programaAcademico}"
                                             styleClass="form-select" required="true">
                                <f:selectItem itemValue="" itemLabel="-- Seleccione --"/>
                                <f:selectItems value="#{aspiranteBean.programas}"/>
                            </h:selectOneMenu>
                        </div>

                        <div class="d-flex gap-3 justify-content-end">
                            <h:commandButton value="Limpiar"
                                             action="#{aspiranteBean.limpiarFormulario}"
                                             styleClass="btn btn-limpiar"/>
                            <h:commandButton value="Registrar"
                                             action="#{aspiranteBean.registrarAspirante}"
                                             styleClass="btn btn-registrar"/>
                        </div>

                    </h:form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer>
    <div class="container text-center">
        <strong>Cristian David Peña Saavedra</strong>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
